<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Dumb Friend Detector - 🔥 EXTREME 🔥</title>
  <style>
    body {
      background-color: #000;
      color: #ff4444;
      font-family: 'Courier New', monospace;
      text-align: center;
      padding: 50px;
    }
    h1 {
      font-size: 60px;
      color: #ff0000;
      text-shadow: 2px 2px #000;
    }
    .question {
      margin: 30px 0;
    }
    input {
      padding: 10px;
      font-size: 18px;
      border: 2px solid #ff2222;
      border-radius: 8px;
    }
    button {
      padding: 15px 30px;
      font-size: 20px;
      background-color: #ff2222;
      color: white;
      border: none;
      border-radius: 10px;
      cursor: pointer;
    }
    button:hover {
      background-color: #aa0000;
    }
    #result {
      margin-top: 40px;
      font-size: 28px;
      color: #fff76a;
      font-weight: bold;
    }
  </style>
</head>
<body>

  <h1>💣 Dumb Friend Detector™</h1>

  <div class="question">
    <label>1. How many sides does a hexagon have?</label><br>
    <input type="text" id="q1">
  </div>

  <div class="question">
    <label>2. What’s the square root of 144?</label><br>
    <input type="text" id="q2">
  </div>

  <div class="question">
    <label>3. Complete the sequence: 2, 4, 8, 16, ?</label><br>
    <input type="text" id="q3">
  </div>

  <div class="question">
    <label>4. Spell "embarrassment" correctly:</label><br>
    <input type="text" id="q4">
  </div>

  <div class="question">
    <label>5. Your name (so we can absolutely obliterate you):</label><br>
    <input type="text" id="name">
  </div>

  <button onclick="roastThem()">Submit for Judgment 🔥</button>

  <div id="result"></div>

  <script>
    function roastThem() {
      const q1 = document.getElementById('q1').value.trim();
      const q2 = document.getElementById('q2').value.trim();
      const q3 = document.getElementById('q3').value.trim();
      const q4 = document.getElementById('q4').value.toLowerCase().trim();
      const name = document.getElementById('name').value.trim() || "Mystery Clown";

      let score = 0;
      if (q1 === "6") score++;
      if (q2 === "12") score++;
      if (q3 === "32") score++;
      if (q4 === "embarrassment") score++;

      const roastList = [
        "Your brain is on airplane mode.",
        "That performance was a war crime.",
        "Google won’t even help you now.",
        "Your neurons are socially distancing.",
        "You're why aliens won’t visit Earth.",
        "Even Siri would’ve slapped you.",
        "Bro, even 404 errors make more sense.",
        "The mitochondria is the powerhouse of the cell—too bad you’re powerless."
      ];

      const result = document.getElementById('result');

      if (score === 4) {
        result.innerHTML = `${name}, somehow... you're not dumb. We’re stunned. Is this AI-generated? 🤖`;
      } else if (score === 2 || score === 3) {
        result.innerHTML = `${name}, you're in the "barely functioning" zone. Please charge your brain. 🔋🧠`;
      } else {
        const savage = roastList[Math.floor(Math.random() * roastList.length)];
        result.innerHTML = `${name}, ${savage}`;
      }
    }
  </script>

</body>
</html>
